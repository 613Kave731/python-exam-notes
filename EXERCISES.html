{lvl:"med",title:"Sum of a doubly linked list",
 task:"Write dll_sum(dll) that returns the sum of all node values, then give the result for this DLL.",
 given:`dll = {
    'head': {'prev': None, 'next': 7},
    7:      {'prev': 'head', 'next': 4},
    4:      {'prev': 7, 'next': 10},
    10:     {'prev': 4, 'next': 2},
    2:      {'prev': 10, 'next': 'tail'},
    'tail': {'prev': 2, 'next': None}
}`,
 sol:`def dll_sum(dll):
    current = dll['head']['next']
    total = 0
    while current != 'tail':

        current = dll[current]['next']

{lvl:"hard",title:"Enqueue then dequeue (trace the result)",
 task:"enqueue adds at the tail, dequeue removes from the head. Starting from the DLL below, perform enqueue(dll, 50) then dequeue(dll). Write both functions and give the final order of values (head → tail).",
 given:`dll = {
    'head': {'prev': None, 'next': 10},
    10:     {'prev': 'head', 'next': 20},
    20:     {'prev': 10, 'next': 30},
    30:     {'prev': 20, 'next': 'tail'},
    'tail': {'prev': 30, 'next': None}
}`,
 sol:`def enqueue(dll, x):
    prev = dll['tail']['prev']
    dll[x] = {'prev': prev, 'next': 'tail'}
    dll[prev]['next'] = x
    dll['tail']['prev'] = x
    return dll

def dequeue(dll):
    first = dll['head']['next']
    right = dll[first]['next']
    dll['head']['next'] = right
    dll[right]['prev'] = 'head'
    del dll[first]
    return dll`,
 answer:"After enqueue(50): 10,20,30,50. After dequeue (removes 10): <b>20 → 30 → 50</b>"},

}`,
 sol:`def remove_last2(dll):
    n1 = dll['tail']['prev']      # 44
    n2 = dll[n1]['prev']          # 33

{lvl:"hard",title:"Swap first and last node",

 given:`dll = {
    'head': {'prev': None, 'next': 1},
    1:      {'prev': 'head', 'next': 2},
    2:      {'prev': 1, 'next': 3},
    3:      {'prev': 2, 'next': 4},
    4:      {'prev': 3, 'next': 'tail'},
    'tail': {'prev': 4, 'next': None}
}`,
 sol:`def swap_ends(dll):
    first = dll['head']['next']   # 1
    last = dll['tail']['prev']    # 4
    if first == last:
        return dll
    fn = dll[first]['next']       # 2
    lp = dll[last]['prev']        # 3
    dll['head']['next'] = last
    dll[last]['prev'] = 'head'
    dll[last]['next'] = fn
    dll[fn]['prev'] = last
    dll[lp]['next'] = first
    dll[first]['prev'] = lp
    dll[first]['next'] = 'tail'
    dll['tail']['prev'] = first
    return dll`,
 answer:"Swap 1 and 4 → <b>4 → 2 → 3 → 1</b>"},

    words = text.split()
    for w in words:
        d[w] = len(w)
    return d`,
 answer:"<b>{'the': 3, 'quick': 5, 'brown': 5, 'fox': 3}</b>"},

{lvl:"hard",title:"Query grades by subject and score",

subject, min_score = 'Math', 25`,

{lvl:"hard",title:"Invert and group a dictionary",
 task:"Write invert_and_group(d) that builds a new dict value → list of keys having that value. Give the result for the dict below.",
 given:`d = {
    'a': 1,
    'b': 2,
    'c': 1,
    'd': 3,
    'e': 2
}`,
 sol:`def invert_and_group(d):
    inverse = {}
    for k in d:
        val = d[k]
        if val not in inverse:
            inverse[val] = [k]
        else:
            inverse[val].append(k)
    return inverse`,
 answer:"<b>{1: ['a','c'], 2: ['b','e'], 3: ['d']}</b>"},

 given:`d = {

    'plum': 15
}`,
 sol:`def max_key(d):
    best_key = None
    best_val = None
    for k in d:
        if best_val is None or d[k] > best_val:
            best_val = d[k]
            best_key = k
    return best_key`,

{lvl:"hard",title:"Build a frequency dict from a list",
 task:"Write frequency(lst) returning a dict element → how many times it appears. Give the result for the list below.",
 given:`lst = [4, 7, 4, 4, 9, 7, 2]`,
 sol:`def frequency(lst):
    d = {}
    for x in lst:
        if x in d:
            d[x] += 1
        else:
            d[x] = 1
    return d`,

//  RENDER
// ════════════════════════════════════════════════
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildGroup(topic){
  const list = EX[topic];
  let html = '';
  list.forEach((e, idx)=>{
    const lvlClass = e.lvl === 'hard' ? 'hard' : 'med';
    const lvlText = e.lvl === 'hard' ? 'Hard' : 'Medium';
    html += `<div class="ex">
      <div class="ex-head">
        <span class="num">${idx+1}</span>
        <span class="lvl ${lvlClass}">${lvlText}</span>
      </div>
      <div class="ex-title">${e.title}</div>
      <div class="task">${e.task}</div>
      <div class="given">Given</div>
      <pre>${esc(e.given)}</pre>
      <button class="reveal-btn" onclick="toggleSol(this)">✅ Show solution</button>
      <div class="sol">
        <div class="sol-label">Full solution</div>
        <pre>${esc(e.sol)}</pre>
        <div class="answer">Answer: ${e.answer}</div>
        ${e.note ? `<div class="note">${e.note}</div>` : ''}
      </div>
    </div>`;
  });
  document.getElementById('g-'+topic).innerHTML = html;
}

['dll','tree','sll','dict'].forEach(buildGroup);

function toggleSol(btn){
  const sol = btn.nextElementSibling;
  sol.classList.toggle('show');
  btn.textContent = sol.classList.contains('show') ? '🙈 Hide solution' : '✅ Show solution';
}

function showG(topic, el){
  document.querySelectorAll('.group').forEach(g=>g.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(t=>t.classList.remove('active'));
  document.getElementById('g-'+topic).classList.add('active');
  el.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleAll(){
  const active = document.querySelector('.group.active');
  const sols = active.querySelectorAll('.sol');
  const anyHidden = [...sols].some(s=>!s.classList.contains('show'));
  sols.forEach(s=>{
    if(anyHidden) s.classList.add('show'); else s.classList.remove('show');
    const btn = s.previousElementSibling;
    btn.textContent = anyHidden ? '🙈 Hide solution' : '✅ Show solution';
  });
}
